<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARPL Experiment Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafafa;--surface:#f1f5f9;--card:#fff;--border:#e2e8f0;--t1:#0f172a;--t2:#475569;--t3:#94a3b8;--blue:#2563eb;--green:#059669;--red:#dc2626;--active-bg:#1e293b;--active-fg:#fff}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--surface:#1e293b;--card:#1e293b;--border:#334155;--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--blue:#60a5fa;--green:#34d399;--red:#f87171;--active-bg:#e2e8f0;--active-fg:#0f172a}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t1);padding:24px;max-width:960px;margin:0 auto}
.hdr{margin-bottom:28px}.hdr-label{font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}.hdr-title{font-size:22px;font-weight:500;letter-spacing:-0.5px}.hdr-sub{font-size:13px;color:var(--t3);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.refresh-btn{padding:4px 12px;font-size:12px;font-family:inherit;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--t2);cursor:pointer;display:inline-flex;align-items:center;gap:4px}.refresh-btn:hover{background:var(--border)}.refresh-btn.loading{opacity:0.5;pointer-events:none}
.spin{display:inline-block;animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.filters{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;padding:16px 18px;background:var(--surface);border-radius:10px}.filter-row{display:flex;align-items:center;gap:8px}.filter-label{font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;width:60px;flex-shrink:0}.tab-group{display:flex;gap:3px;background:var(--card);border-radius:8px;padding:3px;flex-wrap:wrap}.tab{padding:7px 16px;font-size:13px;font-weight:400;border-radius:6px;cursor:pointer;border:none;font-family:inherit;background:transparent;color:var(--t3);transition:all 0.15s}.tab.on{background:var(--active-bg);color:var(--active-fg);font-weight:500}
.breadcrumb{font-size:14px;color:var(--t2);margin-bottom:16px;font-weight:500}
.cards{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}.arm-card{flex:1;min-width:220px;border-radius:10px;padding:16px 18px;border:1.5px solid var(--border);background:var(--card)}.arm-card.winner{border-color:var(--arm-color)}
.arm-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}.arm-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}.arm-name{font-size:14px;font-weight:500}.arm-plan{font-size:11px;color:var(--t3)}.badge{margin-left:auto;font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;color:#fff}
.metric-pair{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}.metric-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px}.metric-val{font-size:26px;font-weight:500;line-height:1.1}
.arm-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;font-size:11px;color:var(--t3)}.arm-stats b{color:var(--t1);font-weight:500;font-feature-settings:'tnum'}
.arm-extra{margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px;color:var(--t3)}.arm-extra b{color:var(--t1);font-weight:500}
.bar-section{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}.bar-title{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:8px}.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}.bar-label{width:56px;font-size:11px;color:var(--t3);text-align:right}.bar-label.best{font-weight:500}.bar-track{flex:1;height:22px;background:var(--surface);border-radius:4px;overflow:hidden;position:relative}.bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:4px;transition:width 0.4s ease}.bar-val{width:80px;font-size:13px;text-align:right;font-feature-settings:'tnum'}.bar-val.best{font-weight:500}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);margin-bottom:20px}table{width:100%;border-collapse:collapse;font-size:12px}thead tr{background:var(--surface)}th{text-align:right;padding:8px 10px;font-size:11px;font-weight:500;color:var(--t2)}th:first-child{text-align:left;padding-left:12px}td{text-align:right;padding:8px 10px;font-feature-settings:'tnum';border-top:1px solid var(--border)}td:first-child{text-align:left;padding-left:12px}td.best{font-weight:500}
.arm-cell{display:flex;align-items:center;gap:6px}.arm-cell-dot{width:8px;height:8px;border-radius:2px}
.footer{padding:14px 18px;border-radius:8px;border:1px solid var(--border);font-size:12px;color:var(--t3);line-height:1.7}.footer b{color:var(--t1);font-weight:500}
.empty{padding:40px;text-align:center;color:var(--t3);font-size:14px;border:1px dashed var(--border);border-radius:10px}
.status{font-size:12px;color:var(--t3);margin-top:4px}
.debug{font-size:11px;color:var(--t3);background:var(--surface);padding:12px;border-radius:8px;margin-top:8px;white-space:pre-wrap;font-family:monospace;max-height:300px;overflow-y:auto;display:none}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-label">ARPL experiment</div>
  <div class="hdr-title">Plan display experiment dashboard</div>
  <div class="hdr-sub">
    <span id="dateRange">Loading...</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()"><span id="refreshIcon">↻</span> Refresh</button>
    <button class="refresh-btn" onclick="document.getElementById('debug').style.display=document.getElementById('debug').style.display==='none'?'block':'none'">Debug</button>
  </div>
  <div class="status" id="status"></div>
  <div class="debug" id="debug"></div>
</div>
<div class="filters">
  <div class="filter-row"><span class="filter-label">Channel</span><div class="tab-group" id="channelTabs"></div></div>
  <div class="filter-row" id="teamRow" style="display:none"><span class="filter-label">Team</span><div class="tab-group" id="teamTabs"></div></div>
  <div class="filter-row"><span class="filter-label">Source</span><div class="tab-group" id="sourceTabs"></div></div>
</div>
<div class="breadcrumb" id="breadcrumb"></div>
<div id="content"></div>
<div class="footer"><b>Metrics guide</b> — LBC = login before conversion (only conversions where the user logged into the app before purchasing). LBC Conv% = LBC conversions ÷ logins. Rev/Login = ARPL × LBC Conv%.</div>

<script src="https://www.gstatic.com/charts/loader.js"></script>
<script>
var SHEET_BASE = 'https://docs.google.com/spreadsheets/d/1l232fqrUCeGQerILhVH6CltrIHNpJOUKK4qmF-VHCwc/gviz/tq?gid=316774704&tq=' + encodeURIComponent('select *');
function sheetUrl() { return SHEET_BASE + '&_cb=' + Date.now(); }
var ARMS=['DEFAULT','EXP1','EXP2'], AC=['#2563eb','#059669','#dc2626'], AL=['Silver, Gold','Gold, Retail Pro','Gold, Platinum'];
var SOURCES=['Whatsapp Bot','partner_dashboard','Manual Upload','DB Upload'];
var SRC_LABELS={all:'All sources',partner_dashboard:'Partner dashboard','Whatsapp Bot':'WhatsApp Bot','Manual Upload':'Manual upload','DB Upload':'DB upload'};
var DATA={}, state={ch:'nontp',tm:'farming',src:'all'}, dbg=[];

function log(m){dbg.push(m)}

function safeDate(v) {
  if (!v) return null;
  if (v instanceof Date && !isNaN(v)) return v;
  var s = String(v).trim();
  if (!s || s==='null' || s==='undefined' || s==='NaN') return null;
  var d;
  d = new Date(s);
  if (!isNaN(d) && d.getFullYear()>2020) return d;
  var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) {
    d = new Date(+m[3], +m[1]-1, +m[2]);
    if (!isNaN(d)) return d;
    d = new Date(+m[3], +m[2]-1, +m[1]);
    if (!isNaN(d)) return d;
  }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) { d = new Date(+m[1], +m[2]-1, +m[3]); if (!isNaN(d)) return d; }
  return null;
}

function normExp(v) {
  if (!v) return '';
  var s = String(v).trim().replace(/\\_/g,'_');
  if (s.indexOf('DEFAULT')>=0) return 'PARTNER_IPT_PLAN:DEFAULT';
  if (s.indexOf('EXP1')>=0) return 'PARTNER_IPT_PLAN:EXP1';
  if (s.indexOf('EXP2')>=0) return 'PARTNER_IPT_PLAN:EXP2';
  if (s.indexOf('PARTNER_IPT_PLAN')>=0) return s;
  return '';
}

google.charts.load('current');
google.charts.setOnLoadCallback(function(){loadData()});

function loadData() {
  var btn=document.getElementById('refreshBtn'), icon=document.getElementById('refreshIcon'), st=document.getElementById('status');
  btn.classList.add('loading'); icon.classList.add('spin');
  st.textContent='Fetching...'; dbg=[];

  var q = new google.visualization.Query(sheetUrl());
  q.send(function(resp){
    btn.classList.remove('loading'); icon.classList.remove('spin');
    if (resp.isError()) { st.textContent='Error: '+resp.getMessage(); log('ERROR: '+resp.getDetailedMessage()); return; }

    var dt=resp.getDataTable(), nc=dt.getNumberOfColumns(), nr=dt.getNumberOfRows();
    log('Rows: '+nr+', Cols: '+nc);

    var ci={};
    for (var c=0;c<nc;c++) { var lb=dt.getColumnLabel(c); ci[lb]=c; }
    log('Columns: '+Object.keys(ci).join(', '));

    var needed=['assigned_date','experiment_info','TP_Flag','ipt_team','data_source','login_date','converted_date','rev'];
    var miss=needed.filter(function(n){return !(n in ci)});
    if (miss.length) { st.textContent='Missing columns: '+miss.join(', '); log('Missing: '+miss.join(', ')+'\nAvailable: '+Object.keys(ci).join(', ')); return; }

    var rows=[];
    for (var r=0;r<nr;r++) {
      var o={};
      for (var key in ci) {
        var v=dt.getValue(r,ci[key]);
        var fv=dt.getFormattedValue(r,ci[key]);
        o[key] = (v instanceof Date) ? v : (fv||String(v||''));
      }
      rows.push(o);
    }
    log('Parsed '+rows.length+' rows');

    if (rows.length>0) {
      var s=rows[0];
      log('Row 0 sample:');
      for (var k in s) { if (needed.indexOf(k)>=0) log('  '+k+' = ['+s[k]+'] type='+typeof s[k]+(s[k] instanceof Date?' (Date)':'')); }
      if (rows.length>10) {
        s=rows[10];
        log('Row 10 sample:');
        for (var k in s) { if (needed.indexOf(k)>=0) log('  '+k+' = ['+s[k]+'] type='+typeof s[k]); }
      }
    }

    var CUT_INT = 20260330;
    function dateInt(d) { if (!d) return 0; return d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate(); }
    rows.forEach(function(r){
      r._ad = safeDate(r.assigned_date);
      r._ld = safeDate(r.login_date);
      r._cd = safeDate(r.converted_date);
      r.experiment_info = normExp(r.experiment_info);
      r.converted_flag = r._cd ? 1 : 0;
      r.login_status = r._ld ? 1 : 0;
      r.lbc = (r._ld && r._cd && r._ld<=r._cd) ? 1 : 0;
      r.rev = parseFloat(r.rev)||0;
    });

    var adNull = rows.filter(function(r){return !r._ad}).length;
    log('assigned_date parse failures: '+adNull+' / '+rows.length);

    var tot=rows.length;
    rows = rows.filter(function(r){return r._ad && dateInt(r._ad) >= CUT_INT});
    log('After date filter (>=20260330): '+rows.length+' (excluded '+(tot-rows.length)+')');

    var exp = rows.filter(function(r){return r.experiment_info.indexOf('PARTNER_IPT_PLAN')>=0});
    log('Experiment rows: '+exp.length);

    var eic={};
    exp.forEach(function(r){eic[r.experiment_info]=(eic[r.experiment_info]||0)+1});
    log('Exp breakdown: '+JSON.stringify(eic));
    log('Conv in exp: '+exp.filter(function(r){return r.converted_flag}).length);
    log('Login in exp: '+exp.filter(function(r){return r.login_status}).length);
    log('LBC in exp: '+exp.filter(function(r){return r.lbc}).length);

    var tpf={}; exp.forEach(function(r){tpf[r.TP_Flag]=(tpf[r.TP_Flag]||0)+1});
    log('TP_Flag: '+JSON.stringify(tpf));
    var itf={}; exp.forEach(function(r){itf[r.ipt_team||'(empty)']=(itf[r.ipt_team||'(empty)']||0)+1});
    log('ipt_team: '+JSON.stringify(itf));

    var dats=rows.map(function(r){return r._ad?r._ad.toISOString().slice(0,10):''}).filter(Boolean).sort();
    var ud=new Set(dats).size;
    document.getElementById('dateRange').textContent = dats.length
      ? dats[0]+' to '+dats[dats.length-1]+' \u00B7 '+ud+' days \u00B7 '+exp.length+' exp leads'
      : 'No valid dates found';

    DATA = buildSegs(exp);
    st.textContent='Refreshed '+new Date().toLocaleTimeString()+' \u00B7 '+tot+' total, '+exp.length+' experiment';
    render();
    document.getElementById('debug').textContent=dbg.join('\n');
  });
}

function calc(sub){
  var r=[];
  ['PARTNER_IPT_PLAN:DEFAULT','PARTNER_IPT_PLAN:EXP1','PARTNER_IPT_PLAN:EXP2'].forEach(function(af){
    var a=sub.filter(function(x){return x.experiment_info===af});
    var ld=a.length, lg=a.filter(function(x){return x.login_status}).length;
    var cv=a.filter(function(x){return x.converted_flag}).length;
    var lb=a.filter(function(x){return x.lbc}).length;
    var ls=a.filter(function(x){return x.lbc});
    var ap=ls.length?Math.round(ls.reduce(function(s,x){return s+x.rev},0)/ls.length):0;
    var lr=ld?Math.round(lg/ld*1000)/10:0;
    var cp=ld?Math.round(cv/ld*1000)/10:0;
    var lp=lg?Math.round(lb/lg*1000)/10:0;
    var rp=lg?Math.round(ap*lb/lg):0;
    r.push([ld,lg,cv,lb,cp,lr,lp,ap,rp]);
  });
  return r;
}
function buildSegs(exp){
  var S={};
  var nt=exp.filter(function(r){return r.TP_Flag==='NON_TP'});
  var tp=exp.filter(function(r){return r.TP_Flag==='TP'});
  S.nontp_all=calc(nt);
  var h=nt.filter(function(r){return r.ipt_team==='hunting'});
  var f=nt.filter(function(r){return r.ipt_team==='farming'});
  S.nontp_hunting_all=calc(h); S.nontp_farming_all=calc(f);
  SOURCES.forEach(function(s){
    var su;
    su=h.filter(function(r){return r.data_source===s}); if(su.length>=15)S['nontp_hunting_'+s]=calc(su);
    su=f.filter(function(r){return r.data_source===s}); if(su.length>=15)S['nontp_farming_'+s]=calc(su);
    su=tp.filter(function(r){return r.data_source===s}); if(su.length>=15)S['tp_'+s]=calc(su);
  });
  S.tp_all=calc(tp);
  log('Segments: '+Object.keys(S).join(', '));
  return S;
}

function best(d,c){var v=d.map(function(r){return r[c]});var m=Math.max.apply(null,v);return m>0?v.indexOf(m):-1}
function inr(v){return '\u20B9'+(v||0).toLocaleString('en-IN')}
function pct(v){return(v||0).toFixed(1)+'%'}
function num(v){return(v||0).toLocaleString('en-IN')}

function makeTab(l,a,fn){var b=document.createElement('button');b.className='tab'+(a?' on':'');b.textContent=l;b.onclick=fn;return b}

function renderFilters(){
  var ct=document.getElementById('channelTabs');ct.innerHTML='';
  ct.appendChild(makeTab('Non-TP',state.ch==='nontp',function(){state.ch='nontp';state.src='all';renderFilters();render()}));
  ct.appendChild(makeTab('TP',state.ch==='tp',function(){state.ch='tp';state.src='all';renderFilters();render()}));
  var tr=document.getElementById('teamRow');
  if(state.ch==='nontp'){tr.style.display='flex';var tt=document.getElementById('teamTabs');tt.innerHTML='';
    tt.appendChild(makeTab('Farming',state.tm==='farming',function(){state.tm='farming';state.src='all';renderFilters();render()}));
    tt.appendChild(makeTab('Hunting',state.tm==='hunting',function(){state.tm='hunting';state.src='all';renderFilters();render()}));
  }else{tr.style.display='none'}
  var ss=state.ch==='tp'?['all','Manual Upload','partner_dashboard','Whatsapp Bot','DB Upload']:['all','Whatsapp Bot','partner_dashboard','Manual Upload','DB Upload'];
  var st=document.getElementById('sourceTabs');st.innerHTML='';
  ss.forEach(function(s){st.appendChild(makeTab(SRC_LABELS[s]||s,state.src===s,function(){state.src=s;renderFilters();render()}))});
  var p=[state.ch==='tp'?'TP':'Non-TP'];
  if(state.ch==='nontp')p.push(state.tm==='farming'?'Farming':'Hunting');
  if(state.src!=='all')p.push(SRC_LABELS[state.src]||state.src);
  document.getElementById('breadcrumb').textContent=p.join(' \u2192 ');
}

function render(){
  var key=state.ch==='tp'?(state.src==='all'?'tp_all':'tp_'+state.src):(state.src==='all'?'nontp_'+state.tm+'_all':'nontp_'+state.tm+'_'+state.src);
  var d=DATA[key],el=document.getElementById('content');
  if(!d){el.innerHTML='<div class="empty">Not enough data for this segment.</div>';return}
  var b8=best(d,8),b6=best(d,6);
  var h='<div class="cards">';
  for(var i=0;i<3;i++){var w=b8===i;
    h+='<div class="arm-card'+(w?' winner':'')+'" style="--arm-color:'+AC[i]+(w?';border-color:'+AC[i]:'')+'">'
    +'<div class="arm-hdr"><div class="arm-dot" style="background:'+AC[i]+'"></div>'
    +'<span class="arm-name">'+ARMS[i]+'</span><span class="arm-plan">'+AL[i]+'</span>'
    +(w?'<span class="badge" style="background:'+AC[i]+'">Best R/Login</span>':'')+'</div>'
    +'<div class="metric-pair"><div><div class="metric-label">LBC conv%</div><div class="metric-val" style="'+(b6===i?'color:'+AC[i]:'')+'">'
    +pct(d[i][6])+'</div></div><div><div class="metric-label">Rev/Login</div><div class="metric-val" style="'+(w?'color:'+AC[i]:'')+'">'
    +inr(d[i][8])+'</div></div></div>'
    +'<div class="arm-stats"><div><b>'+num(d[i][0])+'</b> Leads</div><div><b>'+num(d[i][1])+'</b> Logins</div><div><b>'+num(d[i][3])+'</b> LBC</div></div>'
    +'<div class="arm-extra"><div>ARPL <b>'+inr(d[i][7])+'</b></div><div>Login rate <b>'+pct(d[i][5])+'</b></div></div></div>'}
  h+='</div>';
  function bg(col,lb,fm){var vs=d.map(function(r){return r[col]});var mx=Math.max.apply(null,vs)*1.1||1;var bi=best(d,col);
    var o='<div><div class="bar-title">'+lb+'</div>';
    for(var i=0;i<3;i++){var isB=bi===i;var wp=mx>0?Math.max(vs[i]/mx*100,1):1;
      o+='<div class="bar-row"><div class="bar-label'+(isB?' best':'')+'">'+ARMS[i]+'</div>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+wp+'%;background:'+(isB?AC[i]:AC[i]+'55')+'"></div></div>'
      +'<div class="bar-val'+(isB?' best':'')+'" style="'+(isB?'color:'+AC[i]:'')+'">'
      +fm(vs[i])+'</div></div>'}return o+'</div>'}
  h+='<div class="bar-section">'+bg(6,'LBC conversion % (login \u2192 purchase)',pct)+bg(8,'Revenue per login (LBC)',inr)+'</div>';
  h+='<div class="bar-section">'+bg(5,'Login rate',pct)+bg(7,'ARPL (avg revenue per LBC conversion)',inr)+'</div>';
  var cs=[['Leads',0,num],['Logins',1,num],['Conv',2,num],['LBC',3,num],['Conv%',4,pct],['Login%',5,pct],['LBC%',6,pct],['ARPL',7,inr],['R/Login',8,inr]];
  h+='<div class="tbl-wrap"><table><thead><tr><th style="text-align:left">Arm</th>';
  cs.forEach(function(c){h+='<th>'+c[0]+'</th>'});h+='</tr></thead><tbody>';
  for(var i=0;i<3;i++){h+='<tr><td><div class="arm-cell"><div class="arm-cell-dot" style="background:'+AC[i]+'"></div><span style="font-weight:500">'+ARMS[i]+'</span></div></td>';
    cs.forEach(function(c){var ci=c[1],f=c[2];var isB=(ci===6||ci===8)&&best(d,ci)===i&&d[i][ci]>0;
      h+='<td class="'+(isB?'best':'')+'" style="'+(isB?'color:'+AC[i]:'')+'">'
      +f(d[i][ci])+'</td>'});h+='</tr>'}
  h+='</tbody></table></div>';el.innerHTML=h}

renderFilters();
</script>
</body>
</html>
